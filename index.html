<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceEmoji - 臉部 Emoji 遮蔽工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        #canvas-container { position: relative; display: inline-block; }
        .face-selector {
            position: absolute;
            border: 2px solid #4f46e5;
            background: rgba(79, 70, 229, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .face-selector:hover { background: rgba(79, 70, 229, 0.4); }
        .face-selector input {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">

    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white mb-4"></div>
        <p id="loader-text">正在加載 AI 模型...</p>
    </div>

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl p-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🎭 FaceEmoji</h1>
            <p class="text-gray-500">自動偵測人臉 &rarr; 預設遮蔽 &rarr; 自定義選擇</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">1. 上傳照片</label>
                    <input type="file" id="imageUpload" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">2. 選擇遮蔽 Emoji (可多選)</label>
                    <div id="emoji-palette" class="grid grid-cols-5 gap-2 p-3 bg-gray-50 rounded-lg border border-gray-200">
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="😊">😊</button>
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="😎">😎</button>
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="🤣">🤣</button>
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="😍">😍</button>
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="🥳">🥳</button>
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="😱">😱</button>
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="😭">😭</button>
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="😡">😡</button>
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="🤡">🤡</button>
                        <button class="emoji-opt text-2xl p-1 rounded hover:bg-indigo-200 transition" data-emoji="👻">👻</button>
                    </div>
                    <input type="text" id="customEmoji" placeholder="輸入自定義 Emoji..." class="mt-2 w-full p-2 border rounded text-center" maxlength="2" />
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <p class="text-xs text-gray-400 mb-4">💡 提示：圖片上出現藍色方框的臉預設將被遮蔽，取消勾選即可保留原臉。</p>
                    <button id="processBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg disabled:bg-gray-400" disabled>
                        生成遮蔽圖片
                    </button>
                    <a id="downloadBtn" class="hidden w-full block text-center bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition shadow-lg mt-3">
                        下載結果
                    </a>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-2xl p-4 min-h-[500px] bg-gray-50 overflow-auto">
                <div id="canvas-container">
                    <canvas id="mainCanvas"></canvas>
                    <div id="checkbox-layer"></div>
                </div>
                <p id="placeholder-text" class="text-gray-400">請先上傳照片</p>
            </div>
        </div>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const checkboxLayer = document.getElementById('checkbox-layer');
        const loader = document.getElementById('loader');
        const customEmojiInput = document.getElementById('customEmoji');
        const emojiPalette = document.getElementById('emoji-palette');

        let selectedEmojis = [];
        let detectedFaces = [];
        let originalImage = null;

        async function init() {
            loader.style.display = 'flex';
            try {
                const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            } catch (e) {
                alert("模型加載失敗，請檢查網路連線");
            }
            loader.style.display = 'none';
        }

        document.querySelectorAll('.emoji-opt').forEach(btn => {
            btn.onclick = () => {
                const emoji = btn.dataset.emoji;
                if (selectedEmojis.includes(emoji)) {
                    selectedEmojis = selectedEmojis.filter(e => e !== emoji);
                    btn.classList.remove('bg-indigo-400', 'ring-2', 'ring-indigo-600');
                } else {
                    selectedEmojis.push(emoji);
                    btn.classList.add('bg-indigo-400', 'ring-2', 'ring-indigo-600');
                }
            };
        });

        customEmojiInput.oninput = (e) => {
            const val = e.target.value;
            if (val.length > 0) {
                const emoji = val[0];
                if (!selectedEmojis.includes(emoji)) selectedEmojis.push(emoji);
            }
        };

        imageUpload.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            loader.style.display = 'flex';
            document.getElementById('placeholder-text').style.display = 'none';
            downloadBtn.classList.add('hidden');
            
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await img.decode();
            originalImage = img;

            const displayScale = Math.min(1, 800 / img.width);
            mainCanvas.width = img.width * displayScale;
            mainCanvas.height = img.height * displayScale;
            ctx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);

            detectedFaces = await faceapi.detectAllFaces(mainCanvas, new faceapi.TinyFaceDetectorOptions());
            
            checkboxLayer.innerHTML = '';
            
            detectedFaces.forEach((face, index) => {
                const { x, y, width, height } = face.box;
                const selector = document.createElement('div');
                selector.className = 'face-selector';
                selector.style.left = `${x}px`;
                selector.style.top = `${y}px`;
                selector.style.width = `${width}px`;
                selector.style.height = `${height}px`;

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = true;
                cb.dataset.index = index;
                
                selector.onclick = () => {
                    cb.checked = !cb.checked;
                    selector.style.background = cb.checked ? 'rgba(79, 70, 229, 0.2)' : 'rgba(156, 163, 175, 0.1)';
                    selector.style.borderColor = cb.checked ? '#4f46e5' : '#9ca3af';
                };

                selector.appendChild(cb);
                checkboxLayer.appendChild(selector);
            });

            loader.style.display = 'none';
            processBtn.disabled = false;
        };

        processBtn.onclick = () => {
            if (selectedEmojis.length === 0) {
                alert("請選擇至少一個 Emoji！");
                return;
            }

            ctx.drawImage(originalImage, 0, 0, mainCanvas.width, mainCanvas.height);
            const checkboxes = document.querySelectorAll('.face-selector input');
            
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    const idx = cb.dataset.index;
                    const face = detectedFaces[idx];
                    const { x, y, width, height } = face.box;
                    const emoji = selectedEmojis[Math.floor(Math.random() * selectedEmojis.length)];
                    const emojiSize = Math.max(width, height) * 1.3;
                    
                    ctx.font = `${emojiSize}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(emoji, x + width / 2, y + height / 2);
                }
            });

            checkboxLayer.innerHTML = '';
            downloadBtn.classList.remove('hidden');
            downloadBtn.href = mainCanvas.toDataURL('image/png', 1.0);
            downloadBtn.download = 'face-emoji-result.png';
        };
    </script>
</body>
</html>
